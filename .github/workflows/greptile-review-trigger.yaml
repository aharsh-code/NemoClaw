name: AI Code Review

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write
  issues: write

jobs:
  trigger-greptile:
    name: Request Greptile review
    if: github.event.label.name == 'enhancement'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Greptile's GitHub App reviews PRs when @greptileai is mentioned.
      # greptile.json at the repo root restricts reviews to PRs labeled
      # "enhancement", so this mention is a no-op on any other PR.
      # GREPTILE_TRIGGER_PAT should be a personal access token; Greptile may
      # ignore mentions authored by the github-actions bot identity.
      - name: Mention @greptileai to request a review
        env:
          GH_TOKEN: ${{ secrets.GREPTILE_TRIGGER_PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "@greptileai"
