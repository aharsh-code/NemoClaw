name: AI Code Review

on:
  pull_request:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  review:
    if: github.event.label.name == 'AI review'
    runs-on: ubuntu-latest
    steps:
      - name: Greptile Review + Track Developer History
        env:
          GREPTILE_API_KEY: ${{ secrets.GREPTILE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request
            const owner = context.repo.owner
            const repo = context.repo.repo
            const developer = pr.user.login

            // Step 1: Get PR diff
            const files = await github.rest.pulls.listFiles({
              owner, repo, pull_number: pr.number
            })

            const diff = files.data
              .map(f => `### ${f.filename}\n\`\`\`diff\n${f.patch ?? ''}\n\`\`\``)
              .join('\n\n')

            // Step 2: Call Greptile
            const res = await fetch('https://api.greptile.com/v2/query', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GREPTILE_API_KEY}`,
                'X-Github-Token': process.env.GITHUB_TOKEN,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                messages: [{ role: 'user', content: `Review this PR:\n\n${diff}` }],
                repositories: [{
                  remote: 'github',
                  repository: `${owner}/${repo}`,
                  branch: 'main'
                }],
                stream: false
              })
            })

            // Log raw response for debugging
            const rawText = await res.text()
            console.log('Greptile status:', res.status)
            console.log('Greptile raw response:', rawText)

            // Safely parse JSON
            let data
            try {
              data = JSON.parse(rawText)
            } catch (e) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: pr.number,
                body: `## 🤖 AI Code Review\n\n❌ Greptile API error:\n\`\`\`\n${rawText}\n\`\`\``
              })
              throw new Error(`Greptile returned non-JSON response: ${rawText}`)
            }

            const review = data.message ?? data.error ?? JSON.stringify(data)

            // Step 3: Post review comment on the PR
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: pr.number,
              body: `## 🤖 AI Code Review\n\n${review}`
            })

            // Step 4: Find or create tracking issue for this developer
            const trackingLabel = `dev-${developer}`

            // Make sure the label exists
            try {
              await github.rest.issues.getLabel({
                owner, repo, name: trackingLabel
              })
            } catch {
              await github.rest.issues.createLabel({
                owner, repo,
                name: trackingLabel,
                color: 'B0E0FF',
                description: `Review history for @${developer}`
              })
            }

            // Check if tracking issue already exists for this developer
            const existingIssues = await github.rest.issues.listForRepo({
              owner, repo,
              labels: trackingLabel,
              state: 'open'
            })

            const reviewEntry = [
              `### 📝 PR #${pr.number} — ${pr.title}`,
              `- **Developer:** @${developer}`,
              `- **Date:** ${new Date().toISOString().split('T')[0]}`,
              `- **PR Link:** ${pr.html_url}`,
              ``,
              `#### Review Findings:`,
              review,
              `---`
            ].join('\n')

            if (existingIssues.data.length > 0) {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existingIssues.data[0].number,
                body: reviewEntry
              })
              console.log(`Appended review to existing tracking issue for @${developer}`)
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: `🧑‍💻 Review History — @${developer}`,
                labels: [trackingLabel],
                body: [
                  `# Review History for @${developer}`,
                  ``,
                  `This issue tracks all AI code reviews for @${developer}.`,
                  `Each new review is added as a comment below.`,
                  ``,
                  reviewEntry
                ].join('\n')
              })
              console.log(`Created new tracking issue for @${developer}`)
            }
